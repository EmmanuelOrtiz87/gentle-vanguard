<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 230" width="260" height="230" role="img" aria-label="Gentle-Vanguard Logo">
  <defs>
    <linearGradient id="gv-grad-primary" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4DCFFF"/>
      <stop offset="50%" stop-color="#00AAEE"/>
      <stop offset="100%" stop-color="#0055BB"/>
    </linearGradient>
    <filter id="gv-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#00CCFF" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g stroke="url(#gv-grad-primary)" stroke-width="10" fill="none"
     stroke-linecap="round" stroke-linejoin="round" filter="url(#gv-glow)">
    <!-- G: arc center(88,108) r=63, opening on right ±38deg -->
    <!-- Upper gap: (88+49.6, 108-38.8) = (137.6, 69.2) -->
    <!-- Lower gap: (137.6, 146.8) -->
    <!-- Large arc counterclockwise from lower to upper -->
    <path d="M 137.6 146.8 A 63 63 0 1 1 137.6 69.2"/>
    <!-- Crossbar: center to right gap -->
    <line x1="88" y1="108" x2="137" y2="108"/>
    <!-- V left leg: from crossbar end down to V bottom -->
    <line x1="137" y1="108" x2="113" y2="178"/>
    <!-- V right leg: from V bottom up toward arrow tip -->
    <line x1="113" y1="178" x2="197" y2="55"/>
    <!-- Arrow head: tip ~(212,38), wings from shaft at ~(197,55) -->
    <polyline points="186,51 212,38 206,64"/>
  </g>
</svg>
