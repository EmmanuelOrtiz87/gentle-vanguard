name: Test Suite

permissions:
  contents: read

concurrency:
  group: test-suite-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Run Test Suite
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: TypeScript Type Check (mcp-bridge)
        shell: pwsh
        run: |
          if (Test-Path "adapters/mcp-bridge") {
            Push-Location "adapters/mcp-bridge"
            npm ci --ignore-scripts
            npx tsc --noEmit
            if ($LASTEXITCODE -ne 0) {
              Write-Error "TypeScript type check failed"
              exit 1
            }
            Pop-Location
          } else {
            Write-Warning "mcp-bridge directory not found, skipping TypeScript check"
          }

      - name: Run All Tests
        shell: pwsh
        run: |
          if (-not (Test-Path './scripts/run-tests-simple.ps1')) {
            Write-Output "::warning::run-tests-simple.ps1 not found — skipping test suite"
            exit 0
          }
          ./scripts/run-tests-simple.ps1

      - name: Run E2E Tests (Release Workflow)
        shell: pwsh
        run: |
          if (-not (Test-Path './scripts/run-tests-simple.ps1')) {
            Write-Output "::warning::run-tests-simple.ps1 not found — skipping E2E tests"
            exit 0
          }
          ./scripts/run-tests-simple.ps1 -IncludeE2E
        env:
          GIT_AUTHOR_NAME: CI
          GIT_AUTHOR_EMAIL: ci@gentle-vanguard
          GIT_COMMITTER_NAME: CI
          GIT_COMMITTER_EMAIL: ci@gentle-vanguard

      - name: Check Performance Baselines
        shell: pwsh
        continue-on-error: true
        run: |
          if (-not (Test-Path '.\scripts\testing\check-performance-baselines.ps1')) {
            Write-Output "::warning::check-performance-baselines.ps1 not found — skipping"
            exit 0
          }
          .\scripts\testing\check-performance-baselines.ps1

      - name: Accessibility Check
        shell: pwsh
        continue-on-error: true
        run: |
          if (-not (Test-Path '.\scripts\testing\check-accessibility.ps1')) {
            Write-Output "::warning::check-accessibility.ps1 not found — skipping"
            exit 0
          }
          .\scripts\testing\check-accessibility.ps1 -FailOnViolations:$false
          Write-Host "Accessibility check completed"

      - name: I18n Validation
        shell: pwsh
        continue-on-error: true
        run: |
          if (-not (Test-Path '.\scripts\testing\check-i18n.ps1')) {
            Write-Output "::warning::check-i18n.ps1 not found — skipping"
            exit 0
          }
          .\scripts\testing\check-i18n.ps1 -FailOnMissing:$false
          Write-Host "i18n validation completed"

      - name: Generate Test Results
        if: always()
        shell: pwsh
        run: |
          $null = New-Item -ItemType Directory -Path "tests/results" -Force
          @{
            workflow = "test-suite"
            timestamp = (Get-Date -AsUTC -Format 'o')
            triggered_by = "${{ github.sha }}"
            status = if ($LASTEXITCODE -eq 0) { "PASS" } else { "FAIL" }
          } | ConvertTo-Json | Out-File "tests/results/test-suite-result.json" -Encoding UTF8
          Write-Host "Test results saved to tests/results/test-suite-result.json"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-results
          path: tests/results/
          retention-days: 14
