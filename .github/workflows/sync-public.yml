name: Sync Public Repository

permissions:
  contents: write

concurrency:
  group: sync-public
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - 'build/**'
      - 'config/**'
      - 'scripts/utilities/DEPLOYMENT/**'
      - 'skills/**'
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  sync:
    name: Sync to foundation-public
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          path: private

      - name: Sync to public repo
        id: sync
        shell: pwsh
        env:
          PAT_SYNC: ${{ secrets.PAT_SYNC }}
        run: |
          if ([string]::IsNullOrEmpty($env:PAT_SYNC)) {
            Write-Output "::warning::PAT_SYNC secret NOT configured. To fix:"
            Write-Output "::warning::  1. Create classic PAT (repo scope) at https://github.com/settings/tokens"
            Write-Output "::warning::  2. Add as 'PAT_SYNC' in Settings → Secrets and variables → Actions"
            exit 0
          }

          $publicDir = "$env:GITHUB_WORKSPACE\public"
          $privateRepo = "$env:GITHUB_WORKSPACE\private"
          $authUrl = "https://x-access-token:$env:PAT_SYNC@github.com/EmmanuelOrtiz87/foundation-public.git"

          # --- Clone public repo ---
          Write-Output "::group::Clone foundation-public"
          New-Item -ItemType Directory -Path $publicDir -Force | Out-Null
          Set-Location $publicDir
          git init
          git remote add origin $authUrl
          git fetch origin master --depth=1 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::error::Failed to fetch foundation-public. Check PAT permissions."
            exit 1
          }
          git checkout -b master FETCH_HEAD
          git config --local user.name "foundation-bot"
          git config --local user.email "bot@gentleman-foundation"
          Write-Output "::endgroup::"

          # --- Run sync script ---
          Write-Output "::group::Sync files"
          & "$privateRepo\scripts\utilities\DEPLOYMENT\sync-to-public.ps1" -privateRepo $privateRepo -publicRepo $publicDir -skipPush
          Write-Output "::endgroup::"

          # --- Commit and push ---
          Write-Output "::group::Push to foundation-public"
          $hasChanges = git status --porcelain
          if ([string]::IsNullOrEmpty($hasChanges)) {
            Write-Output "ℹ️  Nothing to push — public repo is up to date"
            exit 0
          }
          git add -A
          $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm"
          git commit -m "sync: automated sync from private repo - $timestamp"
          git push origin master 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Output "✅ Pushed to foundation-public master"
          } else {
            Write-Output "::error::Push failed (exit code $LASTEXITCODE)"
            exit 1
          }
          Write-Output "::endgroup::"
