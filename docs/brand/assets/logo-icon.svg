<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Gentle-Vanguard Icon">
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <clipPath id="rounded-clip">
      <rect width="200" height="200" rx="36" ry="36"/>
    </clipPath>
    <filter id="icon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="200" height="200" rx="36" ry="36" fill="#2A2D3A"/>
  <!-- GV monogram, scaled to fit icon -->
  <g clip-path="url(#rounded-clip)">
    <g stroke="url(#icon-grad)" stroke-width="8" fill="none"
       stroke-linecap="round" stroke-linejoin="round"
       filter="url(#icon-glow)"
       transform="translate(10,10) scale(0.69)">
      <!-- G arc -->
      <path d="M 137.6 146.8 A 63 63 0 1 1 137.6 69.2"/>
      <!-- Crossbar -->
      <line x1="88" y1="108" x2="137" y2="108"/>
      <!-- V left leg -->
      <line x1="137" y1="108" x2="113" y2="178"/>
      <!-- V right leg -->
      <line x1="113" y1="178" x2="197" y2="55"/>
      <!-- Arrow head -->
      <polyline points="186,51 212,38 206,64"/>
    </g>
  </g>
</svg>
