name: Dashboard Auto Refresh

permissions:
  contents: read

concurrency:
  group: dashboard-auto-refresh
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC | 04:00 GMT-3
  push:
    branches:
      - main
    paths:
      - 'scripts/utilities/TELEMETRY-METRICS/generate-dashboard.ps1'
      - 'docs/sessions/metrics/**'
      - 'docs/management/telemetry-master.csv'
      - '.runtime/telemetry/**'
      - '.event-bus/**'

jobs:
  dashboard:
    name: Generate Dashboard Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate dashboard
        shell: pwsh
        run: |
          ./scripts/utilities/TELEMETRY-METRICS/generate-dashboard.ps1

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-${{ github.run_id }}
          path: reports/dashboard.html
          if-no-files-found: error
