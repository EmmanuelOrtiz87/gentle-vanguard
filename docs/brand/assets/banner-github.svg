<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Gentle-Vanguard GitHub Header">
  <defs>
    <linearGradient id="gh-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gh-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1A2035"/>
    </linearGradient>
    <filter id="gh-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gh-circuit" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 20 60 H 50 M 50 60 V 30 H 80 M 80 30 H 110
               M 90 90 H 60 V 75 H 30 M 110 110 V 80 H 90
               M 10 10 H 30 V 25"
            stroke="#1A3050" stroke-width="1" fill="none"/>
      <circle cx="50" cy="60" r="2.5" fill="#1A3050"/>
      <circle cx="80" cy="30" r="2.5" fill="#1A3050"/>
      <circle cx="60" cy="90" r="2.5" fill="#1A3050"/>
      <circle cx="90" cy="80" r="2.5" fill="#1A3050"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1280" height="320" fill="url(#gh-bg)"/>
  <rect width="1280" height="320" fill="url(#gh-circuit)" opacity="0.5"/>
  <!-- GV logo mark scaled to ~180px height -->
  <g stroke="url(#gh-logo-grad)" stroke-width="12" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     filter="url(#gh-glow)"
     transform="translate(80, 40) scale(0.78)">
    <path d="M 137.6 146.8 A 63 63 0 1 1 137.6 69.2"/>
    <line x1="88" y1="108" x2="137" y2="108"/>
    <line x1="137" y1="108" x2="113" y2="178"/>
    <line x1="113" y1="178" x2="197" y2="55"/>
    <polyline points="186,51 212,38 206,64"/>
  </g>
  <!-- Brand name -->
  <text x="330" y="155" fill="#00BFFF"
        font-family="Orbitron, 'Share Tech Mono', monospace"
        font-size="64" font-weight="700" letter-spacing="4">GENTLE-VANGUARD</text>
  <!-- Tagline -->
  <text x="333" y="200" fill="#6B7280"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" letter-spacing="4">ADVANCED TECHNOLOGY SOLUTIONS</text>
</svg>
