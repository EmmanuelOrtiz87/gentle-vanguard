# lefthook.yml v2 — Git hooks for Gentle-Vanguard
# Install: npm install lefthook && npx lefthook install

post-commit:
  commands:
    codegraph-sync:
      run:
        pwsh -NoProfile -ExecutionPolicy Bypass -File
        "scripts/utilities/CODEGRAPH/codegraph-post-modification-sync.ps1" -Trigger post-commit -Force
    hashline-snapshot:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/editing/hashline-snapshot-hook.ps1"

post-merge:
  commands:
    codegraph-sync:
      run:
        pwsh -NoProfile -ExecutionPolicy Bypass -File
        "scripts/utilities/CODEGRAPH/codegraph-post-modification-sync.ps1" -Trigger post-merge -Force

pre-commit:
  commands:
    opencode-validation:
      run:
        powershell -NoProfile -ExecutionPolicy Bypass -File
        "hooks/pre-commit-opencode-validation.ps1"
    validate-tool-configs:
      run:
        pwsh -NoProfile -ExecutionPolicy Bypass -File
        "scripts/utilities/CONFIG/validate-tool-configs.ps1" -Fix -Quiet
    json-lint:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "hooks/json-lint.ps1"
    workflow-lint:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "hooks/workflow-lint.ps1"
    lockfile-lint:
      glob: 'package-lock.json'
      run:
        pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/lockfile-lint-pre-commit.ps1"
    trufflehog-scan:
      run:
        pwsh -NoProfile -ExecutionPolicy Bypass -Command "trufflehog filesystem --no-verification
        --no-update . *>$null; exit 0"
    skill-scan:
      glob: 'skills/*/SKILL.md'
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/security/scan-skill.ps1" -Path {staged_files} -ThresholdScore 80 -PassThru | Out-Null

pre-push:
  commands:
    audit-check:
      run:
        pwsh -NoProfile -ExecutionPolicy Bypass -File
        "skills/gentle-vanguard-audit-skill/scripts/audit-sweep.ps1" -Scope quick
    orchestrator-auto-fix:
      run:
        pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/orchestrate-auto-fix.ps1" -Fix
    npm-audit:
      glob: 'package.json'
      run:
        pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/npm-audit-pre-push.ps1"
        -AuditLevel moderate

commit-msg:
  commands:
    commitlint:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File "hooks/commitlint.ps1" {1}
