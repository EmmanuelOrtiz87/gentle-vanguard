name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Run tests
        run: |
          go test ./...
          cd web && npm ci && npm test -- --watch=false && cd ..

      - name: Build binary
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ${{ github.event.repository.name }} ./cmd/server

      - name: Build web assets
        run: |
          cd web
          npm ci
          npm run build -- --configuration production
          cd ..

      - name: Package release
        run: |
          mkdir release
          cp ${{ github.event.repository.name }} release/
          cp -r web/dist release/
          tar -czvf ${{ github.event.repository.name }}-${{ env.VERSION }}-linux-amd64.tar.gz -C release .
          rm -rf release

      - name: Generate changelog
        run: |
          git fetch origin main
          git log --oneline $(git rev-parse main)..HEAD > changelog.txt || echo "No commits since main" > changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.event.repository.name }}-${{ env.VERSION }}-linux-amd64.tar.gz
            changelog.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
