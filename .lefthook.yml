# lefthook.yml
# Git hooks configuration for Foundation
# Install: npm install lefthook && npx lefthook install

pre-commit:
  run:
    - name: opencode-validation
      run: powershell -NoProfile -ExecutionPolicy Bypass -File "hooks/pre-commit-opencode-validation.ps1" 2>&1
    - name: trufflehog-secrets
      run: trufflehog git file://. --since-commit HEAD --fail
      only: powershell -Command "git diff --cached --name-only | Select-String -Pattern '\.(env|key|pem|p12|pfx|keystore|jks)$'"
    - name: format-check
      run: echo "[pre-commit] Running format check..."

pre-push:
  run:
    - name: orchestrator-auto-fix
      run: powershell -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/orchestrate-auto-fix.ps1" -Fix
    - name: trufflehog-full
      run: trufflehog git file://. --since-commit origin/develop --fail
    - name: judgment-day
      run: echo "[pre-push] Running judgment day..."

commit-msg:
  run:
    - name: commitlint
      run: echo "[commit-msg] Validating commit message format..."

