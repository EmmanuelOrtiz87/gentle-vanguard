name: Review Apps

on:
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  preview:
    name: Create Preview
    runs-on: ubuntu-latest
    environment:
      name: preview-${{ github.event.number }}
      url: https://${{ github.event.number }}.preview.example.com
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build preview image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.number }} .
      
      - name: Push preview image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.number }}
      
      - name: Deploy preview
        run: |
          kubectl apply -f k8s/preview-${{ github.event.number }}.yaml
      
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Preview deployed to: https://${{ github.event.number }}.preview.example.com'
            })

  cleanup:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    needs: [preview]
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Remove preview resources
        run: |
          kubectl delete -f k8s/preview-${{ github.event.number }}.yaml || true
