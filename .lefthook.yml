# lefthook.yml
# Git hooks configuration for Foundation
# Install lefthook: npm install -g lefthook

pre-commit:
  run:
    - powershell -NoProfile -ExecutionPolicy Bypass -File "hooks/pre-commit-opencode-validation.ps1" 2>&1
    - powershell -NoProfile -ExecutionPolicy Bypass -File "scripts/utilities/wf-report.ps1" -Type clarify 2>&1 || true
    - echo "[pre-commit] Running format check..."

pre-push:
  run:
    - powershell -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/orchestrate-auto-fix.ps1" -Fix
    - echo "[pre-push] Running judgment day..."

commit-msg:
  run:
    - echo "[commit-msg] Validating commit message format..."

