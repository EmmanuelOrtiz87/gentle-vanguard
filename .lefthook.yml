# lefthook.yml v2 — Git hooks for Foundation
# Install: npm install lefthook && npx lefthook install

pre-commit:
  commands:
    opencode-validation:
      run:
        powershell -NoProfile -ExecutionPolicy Bypass -File
        "hooks/pre-commit-opencode-validation.ps1"
    json-lint:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "hooks/json-lint.ps1"
    workflow-lint:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "hooks/workflow-lint.ps1"
    lockfile-lint:
      glob: "package-lock.json"
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/lockfile-lint-pre-commit.ps1"

pre-push:
  commands:
    audit-check:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/pre-push-notify.ps1" -HookName "audit-check" -ScriptPath "skills/foundation-audit-skill/scripts/audit-sweep.ps1" -ScriptArgs "-Scope quick"
    orchestrator-auto-fix:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/pre-push-notify.ps1" -HookName "orchestrator-auto-fix" -ScriptPath "scripts/hooks/orchestrate-auto-fix.ps1" -ScriptArgs "-Fix"
    test-suite:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/pre-push-notify.ps1" -HookName "test-suite" -ScriptPath "scripts/run-tests-simple.ps1" -IsLong
    npm-audit:
      glob: "package.json"
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/npm-audit-pre-push.ps1" -AuditLevel moderate

commit-msg:
  commands:
    commitlint:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File "hooks/commitlint.ps1" {1}
