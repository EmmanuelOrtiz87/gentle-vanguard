schema: spec-driven

context: |
  Project: gentle-vanguard
  Description: Native AI cognitive development ecosystem — SDD-driven agent orchestration platform
  Stack: PowerShell 7.4+, Node.js 20+ (lefthook), OpenCode/Claude Code/Cline/Cursor/Windsurf
  Architecture: scripts/ (core, utilities, security, monitoring, metrics, hooks), config/ (JSON-based),
    rules/ (normativas), skills/ (135 skills), .github/workflows/ (16 CI/CD workflows)
  Default branch: develop
  Release branch: main
  Agents: 15+ subagent types (orchestrator, sdd-explore, sdd-design, sdd-apply, sdd-verify,
    doc-agent, ops-agent, gov-agent, session-agent, premortem-agent, finance-agent, legal-agent,
    mkt-agent, sales-agent, hr-agent)
  Tools supported: opencode, claude-code, cline, cursor, windsurf, codex, continue-dev, copilot,
    antigravity, claude-generic
  Memory: Engram (persistent), CodeGraph (code graph index)
  Hooks: Lefthook v2.1.8 (pre-commit, commit-msg, post-commit, pre-push)
  CI: Dependabot (github-actions + npm), 16 GitHub Actions workflows

strict_tdd: true

rules:
  proposal:
    - Include affected scripts/ and config/ areas
    - Identify cross-tool compatibility impact
    - Reference relevant skills/ and rules/
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Include PowerShell examples for script changes
  design:
    - Document architecture decisions with rationale
    - Reference existing patterns in scripts/
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing, documentation)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing conventions in neighboring scripts/
    - Load relevant skills for the task domain
    - Prefer Edit tool over Write for existing files
  verify:
    - Run: lefthook validate
    - Run: pwsh -NoProfile scripts/utilities/audit-performance.ps1 (if exists)
    - Run: pwsh -NoProfile -Command "& { . scripts/utilities/detect-tool.ps1 -AsJson }"
    - Compare implementation against every spec scenario
    - Verify cross-tool compatibility (check .clinerules, .cursorrules, .windsurf/)
    - Verify no secrets committed (trufflehog check if available)
  archive:
    - Warn before merging destructive deltas (large removals)
    - Update deprecated/ references if applicable

testing:
  strict_tdd: true
  detected: '2026-05-24'

  policies:
    - 'config/testing-policy.json'
    - 'rules/TESTING-STANDARDS.md'
    - 'rules/SDD-STRICT-TDD.md'

  frameworks:
    powershell:
      runner: 'Invoke-Pester'
      framework: 'Pester 5.7+'
      pattern: 'tests/**/*.tests.ps1'
      note: 'Pester 5.7.1 installed alongside legacy 3.4.0'
    security:
      runner: 'pwsh -NoProfile tests/security/security-checks.tests.ps1'
      framework: 'Pester 5.7+'

  layers:
    unit:
      available: true
      tool: 'Pester'
      note: 'Unit tests in tests/unit/ (46 test files)'
    integration:
      available: true
      tool: 'Pester'
      note: 'Integration tests in tests/integration/ (7 test files)'
    security:
      available: true
      tool: 'Pester'
      note: 'Security tests in tests/security/'
    e2e:
      available: true
      tool: 'Pester'
      note: 'E2E tests in tests/e2e/ — release workflow homologation gate'
