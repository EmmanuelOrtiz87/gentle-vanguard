<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120" role="img" aria-label="Gentle-Vanguard Documentation Banner">
  <defs>
    <linearGradient id="doc-logo-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4DCFFF"/>
      <stop offset="100%" stop-color="#0055BB"/>
    </linearGradient>
    <linearGradient id="doc-bg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A2035"/>
    </linearGradient>
    <filter id="doc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00CCFF" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Circuit pattern -->
    <pattern id="circuit" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 10 40 H 30 M 30 40 V 20 H 50 M 50 20 H 70
               M 60 60 H 40 V 50 H 20 M 70 70 V 50 H 60"
            stroke="#1A3050" stroke-width="1" fill="none"/>
      <circle cx="30" cy="40" r="2" fill="#1A3050"/>
      <circle cx="50" cy="20" r="2" fill="#1A3050"/>
      <circle cx="40" cy="60" r="2" fill="#1A3050"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="900" height="120" fill="url(#doc-bg-grad)"/>
  <rect width="900" height="120" fill="url(#circuit)" opacity="0.6"/>
  <!-- Border -->
  <rect width="900" height="120" rx="8" ry="8" fill="none" stroke="#1E3A5F" stroke-width="1.5"/>
  <!-- GV logo mark, scaled to ~80px height -->
  <g stroke="url(#doc-logo-grad)" stroke-width="5.5" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     filter="url(#doc-glow)"
     transform="translate(20, 8) scale(0.365)">
    <path d="M 137.6 146.8 A 63 63 0 1 1 137.6 69.2"/>
    <line x1="88" y1="108" x2="137" y2="108"/>
    <line x1="137" y1="108" x2="113" y2="178"/>
    <line x1="113" y1="178" x2="197" y2="55"/>
    <polyline points="186,51 212,38 206,64"/>
  </g>
  <!-- Brand name -->
  <text x="120" y="62" fill="#00BFFF"
        font-family="Orbitron, 'Share Tech Mono', monospace"
        font-size="36" font-weight="700" letter-spacing="3">GENTLE-VANGUARD</text>
  <!-- Tagline -->
  <text x="122" y="88" fill="#6B7280"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="13" font-weight="400" letter-spacing="2">ADVANCED TECHNOLOGY SOLUTIONS</text>
</svg>
