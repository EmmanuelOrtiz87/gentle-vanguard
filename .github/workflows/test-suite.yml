name: Test Suite

permissions:
  contents: read

concurrency:
  group: test-suite-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Run Test Suite
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TypeScript Type Check (mcp-bridge)
        shell: pwsh
        run: |
          if (Test-Path "adapters/mcp-bridge") {
            Push-Location "adapters/mcp-bridge"
            npm ci --ignore-scripts
            npx tsc --noEmit
            if ($LASTEXITCODE -ne 0) {
              Write-Error "TypeScript type check failed"
              exit 1
            }
            Pop-Location
          } else {
            Write-Warning "mcp-bridge directory not found, skipping TypeScript check"
          }

      - name: Run All Tests
        shell: pwsh
        run: ./scripts/run-tests-simple.ps1

      - name: Run E2E Tests (Release Workflow)
        shell: pwsh
        run: ./scripts/run-tests-simple.ps1 -IncludeE2E
        env:
          GIT_AUTHOR_NAME: CI
          GIT_AUTHOR_EMAIL: ci@foundation
          GIT_COMMITTER_NAME: CI
          GIT_COMMITTER_EMAIL: ci@foundation

      - name: Check Performance Baselines
        shell: pwsh
        continue-on-error: true
        run: .\scripts\testing\check-performance-baselines.ps1

      - name: Accessibility Check
        shell: pwsh
        continue-on-error: true
        run: |
          .\scripts\testing\check-accessibility.ps1 -FailOnViolations:$false
          Write-Host "Accessibility check completed"

      - name: I18n Validation
        shell: pwsh
        continue-on-error: true
        run: |
          .\scripts\testing\check-i18n.ps1 -FailOnMissing:$false
          Write-Host "i18n validation completed"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: tests/results/
          retention-days: 14
