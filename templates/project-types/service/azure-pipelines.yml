# Azure DevOps Pipeline
# Add this file as azure-pipelines.yml in your project root

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

pr:
  autoCancel: true
  branches:
    include:
      - main
      - develop

variables:
  vmImage: 'ubuntu-latest'
  dockerRegistryServiceConnection: 'DockerRegistry'
  imageName: '$(Build.Repository.Name):$(Build.BuildId)'
  nodeVersion: '20.x'

stages:
  # ─────────────────────────────────────────────────────────────────────────
  # Build & Test Stage
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build and Test
    jobs:
      - job: Lint
        displayName: Lint Code
        pool:
          vmImage: $(vmImage)
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
          - script: |
              npm ci
              npm run lint
              npm run typecheck
            displayName: 'Run linter and typecheck'

      - job: Test
        displayName: Run Tests
        pool:
          vmImage: $(vmImage)
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
          - script: |
              npm ci
              npm run test -- --coverage
            displayName: 'Run tests with coverage'
          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml'
          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/junit.xml'

      - job: BuildDocker
        displayName: Build Docker Image
        pool:
          vmImage: $(vmImage)
        steps:
          - task: Docker@2
            displayName: 'Build and push Docker image'
            inputs:
              command: 'buildAndPush'
              repository: '$(Build.Repository.Name)'
              dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
              tags: |
                $(Build.BuildId)
                latest

  # ─────────────────────────────────────────────────────────────────────────
  # Security Stage
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Security
    displayName: Security Scan
    jobs:
      - job: SecurityScan
        displayName: Security Vulnerability Scan
        pool:
          vmImage: $(vmImage)
        steps:
          - task: Docker@2
            inputs:
              command: 'run'
              arguments: '--rm -v $(Build.SourcesDirectory):/src aquasec/trivy:latest fs --security-checks vuln,config /src'
          - task: WhiteSource@21
            inputs:
              cwd: '$(Build.SourcesDirectory)'

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy to Staging
  # ─────────────────────────────────────────────────────────────────────────
  - stage: DeployStaging
    displayName: Deploy to Staging
    jobs:
      - deployment: DeployStaging
        displayName: 'Deploy to Staging'
        pool:
          vmImage: $(vmImage)
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: Kubernetes@1
                  inputs:
                    connectionType: 'Kubernetes Service Connection'
                    namespace: 'staging'
                    command: 'set'
                    arguments: 'image deployment/{{project-name}} {{project-name}}=$(dockerRegistryServiceConnection)/$(Build.Repository.Name):$(Build.BuildId)'
                - task: Kubernetes@1
                  inputs:
                    connectionType: 'Kubernetes Service Connection'
                    namespace: 'staging'
                    command: 'rollout'
                    arguments: 'status deployment/{{project-name}}'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy to Production
  # ─────────────────────────────────────────────────────────────────────────
  - stage: DeployProduction
    displayName: Deploy to Production
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy to Production'
        pool:
          vmImage: $(vmImage)
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: Kubernetes@1
                  inputs:
                    connectionType: 'Kubernetes Service Connection'
                    namespace: 'production'
                    command: 'set'
                    arguments: 'image deployment/{{project-name}} {{project-name}}=$(dockerRegistryServiceConnection)/$(Build.Repository.Name):$(Build.BuildId)'
                - task: Kubernetes@1
                  inputs:
                    connectionType: 'Kubernetes Service Connection'
                    namespace: 'production'
                    command: 'rollout'
                    arguments: 'status deployment/{{project-name}}'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
