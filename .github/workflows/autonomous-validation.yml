name: Autonomous Validation

permissions:
  contents: read

concurrency:
  group: autonomous-validation-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: '0 13 * * 1' # Weekly on Monday at 10:00 GMT-3 (13:00 UTC)

jobs:
  autonomous-validation:
    name: Autonomous Validation
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Configure Git
        shell: pwsh
        run: |
          git config --global core.symlinks false
          git config --global core.longpaths true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PowerShell Modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
          if (-not (Get-Module -ListAvailable -Name PowerShellGet)) {
            Install-Module -Name PowerShellGet -Force -AllowClobber -Scope CurrentUser
          }

      - name: Run Comprehensive Validation
        shell: pwsh
        run: |
          ./scripts/utilities/WORKFLOW-ORCHESTRATION/comprehensive-validation.ps1 -Verbose

      - name: Validate Plugins
        shell: pwsh
        run: |
          $result = .\scripts\utilities\SKILLS-TOOLS\plugins-discovery.ps1 -Action validate -AsJson
          $parsed = $result | ConvertFrom-Json
          if ($parsed.errors -and $parsed.errors -gt 0) {
            Write-Error "Plugin validation failed: $($parsed.errors) error(s)"
            exit 1
          }
          Write-Host "Plugin validation: PASS ($($parsed.total_plugins) plugins, $($parsed.errors) errors, $($parsed.warnings) warnings)"

      - name: Run Cross-Workspace Validation
        shell: pwsh
        run: |
          ./scripts/monitoring/cross-workspace-validator.ps1 -Fix

      - name: Upload Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: .session/reports/
