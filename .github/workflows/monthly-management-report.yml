name: Monthly Management Report

permissions:
  contents: read

concurrency:
  group: monthly-management-report
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *' # 06:00 UTC | 03:00 GMT-3

jobs:
  report:
    name: Export Metrics and Build Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run monthly report pipeline
        shell: pwsh
        run: |
          ./scripts/utilities/WORKFLOW-ORCHESTRATION/gv.ps1 monthly-report all

      - name: Build executive dashboard snapshot
        shell: pwsh
        run: |
          ./scripts/utilities/TELEMETRY-METRICS/generate-dashboard.ps1

      - name: Upload report artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: management-report-${{ github.run_id }}
          path: |
            reports/MANAGEMENT-REPORT-*.csv
            reports/metrics-export.*
            reports/dashboard.html
          if-no-files-found: warn
