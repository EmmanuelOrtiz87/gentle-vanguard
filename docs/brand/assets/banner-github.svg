<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Gentle-Vanguard GitHub Header">
  <defs>
    <linearGradient id="gh-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1A2035"/>
    </linearGradient>
    <filter id="gh-glow-purple" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gh-glow-cyan" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#06B6D4" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gh-circuit" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 20 60 H 50 M 50 60 V 30 H 80 M 80 30 H 110
               M 90 90 H 60 V 75 H 30 M 110 110 V 80 H 90
               M 10 10 H 30 V 25"
            stroke="#1A3050" stroke-width="1" fill="none"/>
      <circle cx="50" cy="60" r="2.5" fill="#1A3050"/>
      <circle cx="80" cy="30" r="2.5" fill="#1A3050"/>
      <circle cx="60" cy="90" r="2.5" fill="#1A3050"/>
      <circle cx="90" cy="80" r="2.5" fill="#1A3050"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#gh-bg)"/>
  <rect width="1280" height="320" fill="url(#gh-circuit)" opacity="0.5"/>

  <!-- G letter — purple, center (90,160) r=65, opening on right -->
  <g stroke="#A855F7" stroke-width="11" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     filter="url(#gh-glow-purple)"
     transform="translate(55, 52) scale(0.75)">
    <!-- G arc: from lower-right to upper-right (large arc, counterclockwise) -->
    <path d="M 140 201 A 65 65 0 1 1 140 119"/>
    <!-- G crossbar: center to right gap -->
    <line x1="90" y1="160" x2="140" y2="160"/>
  </g>

  <!-- V letter — cyan, clearly separated from G -->
  <g stroke="#06B6D4" stroke-width="11" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     filter="url(#gh-glow-cyan)"
     transform="translate(55, 52) scale(0.75)">
    <!-- V left leg: from upper-left down to V bottom -->
    <line x1="178" y1="119" x2="216" y2="201"/>
    <!-- V right leg: from V bottom up to arrow tip area -->
    <line x1="216" y1="201" x2="284" y2="80"/>
    <!-- Arrow head at top-right of V -->
    <polyline points="272,76 294,62 287,85"/>
  </g>

  <!-- Brand name -->
  <text x="295" y="148" fill="#00BFFF"
        font-family="Orbitron, 'Share Tech Mono', monospace"
        font-size="62" font-weight="700" letter-spacing="4">GENTLE-VANGUARD</text>
  <!-- Tagline -->
  <text x="298" y="193" fill="#6B7280"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="21" font-weight="400" letter-spacing="5">ADVANCED TECHNOLOGY SOLUTIONS</text>
</svg>
