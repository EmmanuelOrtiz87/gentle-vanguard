name: Workflow Lint

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [develop]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: any
