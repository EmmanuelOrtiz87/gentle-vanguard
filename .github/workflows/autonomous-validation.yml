name: Autonomous Validation & Auto-Correction

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'config/**'
      - 'opencode.json'
      - 'workspace-foundation/**'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  validate-and-correct:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup PowerShell
      shell: pwsh
      run: |
        $PSVersionTable
        Write-Host "PowerShell ready for validation"

    - name: Create session directories
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path ".session/logs" -Force | Out-Null
        New-Item -ItemType Directory -Path ".session/reports" -Force | Out-Null
        Write-Host "Session directories created"

    - name: Run System Health Check
      shell: pwsh
      run: |
        & ".\workspace-foundation\scripts\utilities\WORKFLOW-ORCHESTRATION\validate-system-health.ps1" -Verbose
      continue-on-error: true

    - name: Intelligent Validation - opencode.json
      shell: pwsh
      run: |
        & ".\workspace-foundation\scripts\utilities\WORKFLOW-ORCHESTRATION\intelligent-validator.ps1" `
          -FilePath "workspace-foundation/opencode.json" `
          -AutoCorrect `
          -Verbose
      continue-on-error: true

    - name: Intelligent Validation - hooks-config.json
      shell: pwsh
      run: |
        & ".\workspace-foundation\scripts\utilities\WORKFLOW-ORCHESTRATION\intelligent-validator.ps1" `
          -FilePath "workspace-foundation/config/hooks-config.json" `
          -AutoCorrect `
          -Verbose
      continue-on-error: true

    - name: Comprehensive Validation
      shell: pwsh
      run: |
        & ".\workspace-foundation\scripts\utilities\WORKFLOW-ORCHESTRATION\comprehensive-validation.ps1" `
          -Verbose
      continue-on-error: false

    - name: Pre-commit Validation
      shell: pwsh
      run: |
        & ".\workspace-foundation\scripts\utilities\GIT-VERSION-CONTROL\pre-commit-validation.ps1"
      continue-on-error: true

    - name: Validate Configuration Integrity
      shell: pwsh
      run: |
        $errors = 0
        
        # Validate all JSON files
        Get-ChildItem -Path "workspace-foundation/config/*.json" -Recurse | ForEach-Object {
          try {
            Get-Content $_.FullName -Raw | ConvertFrom-Json | Out-Null
            Write-Host "✅ Valid: $($_.Name)"
          }
          catch {
            Write-Host "❌ Invalid: $($_.Name) - $_"
            $errors++
          }
        }
        
        if ($errors -gt 0) {
          Write-Host "Configuration validation failed with $errors errors"
          exit 1
        }
        else {
          Write-Host "All configurations are valid"
          exit 0
        }

    - name: Upload Validation Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-reports
        path: .session/reports/
        retention-days: 30

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-logs
        path: .session/logs/
        retention-days: 30

    - name: Comment PR with Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reports = fs.readdirSync('.session/reports').filter(f => f.endsWith('.json'));
          
          let comment = '## 🔍 Autonomous Validation Results\n\n';
          
          reports.forEach(report => {
            const data = JSON.parse(fs.readFileSync(`.session/reports/${report}`, 'utf8'));
            comment += `### ${report}\n`;
            comment += `- Status: ${data.status}\n`;
            comment += `- Successes: ${data.totalSuccesses || 0}\n`;
            comment += `- Warnings: ${data.totalWarnings || 0}\n`;
            comment += `- Errors: ${data.totalErrors || 0}\n\n`;
          });
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

    - name: Notify on Failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '⚠️ Autonomous validation detected issues. Please review the validation reports.'
          });

  auto-correct:
    needs: validate-and-correct
    if: failure()
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Apply Auto-Corrections
      shell: pwsh
      run: |
        Write-Host "Applying automatic corrections..."
        # Corrections will be applied by intelligent-validator.ps1
        
    - name: Commit Corrections
      shell: pwsh
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Autonomous Validator"
        
        if (git diff --quiet) {
          Write-Host "No changes to commit"
        }
        else {
          git add -A
          git commit -m "🤖 Autonomous: Auto-corrected configuration errors"
          git push
          Write-Host "Auto-corrections committed and pushed"
        }
      continue-on-error: true