name: Sync Public Repository

permissions:
  contents: write

concurrency:
  group: sync-public
  cancel-in-progress: false

on:
  push:
    branches: [develop]
    paths:
      - '.github/workflows/sync-public.yml'
      - 'build/**'
      - 'config/*.example.json'
      - 'config/README.md'
      - 'scripts/foundation/bootstrap*.ps1'
      - 'scripts/foundation/setup-multi-machine.ps1'
      - 'scripts/utilities/DEPLOYMENT/sync-to-public.ps1'
      - 'skills/SKILL_INDEX.md'
      - 'docs/**'
      - 'demos/**'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      public_repo:
        description:
          'Optional override owner/repo for public sync target (example:
          EmmanuelOrtiz87/foundation-public)'
        required: false
        default: ''
      public_repo_default_branch:
        description: 'Optional override for public repo default branch (example: main or master)'
        required: false
        default: ''

jobs:
  sync:
    name: Sync to foundation-public
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          path: private

      - name: Sync to public repo
        id: sync
        shell: pwsh
        env:
          PAT_SYNC: ${{ secrets.PAT_SYNC }}
          PUBLIC_REPO: ${{ github.event.inputs.public_repo }}
          PUBLIC_REPO_DEFAULT_BRANCH: ${{ github.event.inputs.public_repo_default_branch }}
        run: |
          if ([string]::IsNullOrEmpty($env:PAT_SYNC)) {
            Write-Output "::warning::PAT_SYNC secret NOT configured. To fix:"
            Write-Output "::warning::  1. Create classic PAT (repo scope) at https://github.com/settings/tokens"
            Write-Output "::warning::  2. Add as 'PAT_SYNC' in Settings → Secrets and variables → Actions"
            exit 0
          }

          $publicRepoSlug = if ([string]::IsNullOrWhiteSpace($env:PUBLIC_REPO)) {
            'EmmanuelOrtiz87/foundation-public'
          } else {
            $env:PUBLIC_REPO
          }

          $publicDir = "$env:GITHUB_WORKSPACE\public"
          $privateRepo = "$env:GITHUB_WORKSPACE\private"
          $authUrl = "https://x-access-token:$env:PAT_SYNC@github.com/$publicRepoSlug.git"

          # --- Clone public repo ---
          Write-Output "::group::Clone foundation-public"
          New-Item -ItemType Directory -Path $publicDir -Force | Out-Null
          Set-Location $publicDir
          git init
          git remote add origin $authUrl

          $defaultBranch = if ([string]::IsNullOrWhiteSpace($env:PUBLIC_REPO_DEFAULT_BRANCH)) {
            $headLine = git ls-remote --symref origin HEAD 2>&1 | Select-String 'refs/heads/' | Select-Object -First 1
            if ($headLine) {
              (($headLine.ToString() -split '\s+')[1] -replace 'refs/heads/', '')
            } else {
              'main'
            }
          } else {
            $env:PUBLIC_REPO_DEFAULT_BRANCH
          }

          git fetch origin $defaultBranch --depth=1 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::error::Failed to fetch foundation-public. Check PAT permissions."
            exit 1
          }
          git checkout -B $defaultBranch FETCH_HEAD
          git config --local user.name "foundation-bot"
          git config --local user.email "bot@foundation"
          Write-Output "::endgroup::"

          # --- Run sync script ---
          Write-Output "::group::Sync files"
          & "$privateRepo\scripts\utilities\DEPLOYMENT\sync-to-public.ps1" -privateRepo $privateRepo -publicRepo $publicDir -publicRepoSlug $publicRepoSlug -skipPush
          Write-Output "::endgroup::"

          # --- Commit and push ---
          Write-Output "::group::Push to foundation-public"
          $hasChanges = git status --porcelain
          if ([string]::IsNullOrEmpty($hasChanges)) {
            Write-Output "ℹ️  Nothing to push — public repo is up to date"
            exit 0
          }
          git add -A
          $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm"
          git commit -m "sync: automated sync from private repo - $timestamp"
          git push origin $defaultBranch 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Output "✅ Pushed to foundation-public $defaultBranch"
          } else {
            Write-Output "::error::Push failed (exit code $LASTEXITCODE)"
            exit 1
          }
          Write-Output "::endgroup::"
