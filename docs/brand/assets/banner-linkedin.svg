<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" role="img" aria-label="Gentle-Vanguard LinkedIn Banner">
  <defs>
    <linearGradient id="li-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DCFFF"/>
      <stop offset="100%" stop-color="#0055BB"/>
    </linearGradient>
    <linearGradient id="li-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1A2035"/>
    </linearGradient>
    <filter id="li-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00CCFF" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="li-circuit" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 20 60 H 50 V 30 H 80 M 80 30 H 110 M 90 90 H 60 V 75 H 30"
            stroke="#1A3050" stroke-width="1" fill="none"/>
      <circle cx="50" cy="60" r="2" fill="#1A3050"/>
      <circle cx="80" cy="30" r="2" fill="#1A3050"/>
    </pattern>
  </defs>
  <rect width="1584" height="396" fill="url(#li-bg)"/>
  <rect width="1584" height="396" fill="url(#li-circuit)" opacity="0.4"/>
  <!-- GV logo left -->
  <g stroke="url(#li-logo-grad)" stroke-width="10" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     filter="url(#li-glow)"
     transform="translate(60, 50) scale(1.0)">
    <path d="M 137.6 146.8 A 63 63 0 1 1 137.6 69.2"/>
    <line x1="88" y1="108" x2="137" y2="108"/>
    <line x1="137" y1="108" x2="113" y2="178"/>
    <line x1="113" y1="178" x2="197" y2="55"/>
    <polyline points="186,51 212,38 206,64"/>
  </g>
  <!-- Brand name -->
  <text x="330" y="160" fill="#00BFFF"
        font-family="Orbitron, 'Share Tech Mono', monospace"
        font-size="56" font-weight="700" letter-spacing="3">GENTLE-VANGUARD</text>
  <text x="333" y="205" fill="#6B7280"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="18" letter-spacing="4">ADVANCED TECHNOLOGY SOLUTIONS</text>
  <!-- Divider -->
  <line x1="333" y1="228" x2="1000" y2="228" stroke="#1E3A5F" stroke-width="1"/>
  <!-- Stats row -->
  <g font-family="'Inter', 'Segoe UI', sans-serif" font-size="14" fill="#4DCFFF">
    <text x="333" y="262">17 Agents</text>
    <text x="433" y="262" fill="#1E3A5F">|</text>
    <text x="453" y="262">134 Skills</text>
    <text x="563" y="262" fill="#1E3A5F">|</text>
    <text x="583" y="262">10 Tools</text>
    <text x="673" y="262" fill="#1E3A5F">|</text>
    <text x="693" y="262">AES-256 Encrypted</text>
    <text x="863" y="262" fill="#1E3A5F">|</text>
    <text x="883" y="262">Cross-Platform</text>
  </g>
  <!-- Tagline -->
  <text x="333" y="310" fill="#9CA3AF"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="16">Native AI Cognitive Development Ecosystem · Persistent Memory · Business-Driven Code</text>
  <!-- Bottom mark -->
  <text x="333" y="358" fill="#374151"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="12" letter-spacing="2">github.com/EmmanuelOrtiz87/gentle-vanguard-public</text>
</svg>
