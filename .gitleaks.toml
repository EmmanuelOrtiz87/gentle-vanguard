# Gitleaks configuration - extends default rules with project-specific patterns
# Docs: https://github.com/gitleaks/gitleaks

[extend]
useDefault = true

# Custom allowlist for known test/fake secrets
[allowlist]
description = "Global allowlist for foundation"
paths = [
    # Test fixtures with intentional secrets
    "tests/",
    "skills/testing-skill/",
    "demos/",
    # Security skill examples with placeholder/demo API keys
    "skills/security-expert-skill/",
    # Model router config with intentional password hash
    "config/model-router\\.json",
    # Private sync workflow intentionally references PAT_SYNC and x-access-token
    "\\.github/workflows/sync-public\\.yml",
]

regexes = [
    # Allow example.com and test domains
    "(?i)example\\.(com|org|net)",
    # Allow generic placeholder tokens
    "(?i)your-(api-key|token|secret|password)",
    # Allow RFC 5735 test IPs
    "^192\\.0\\.2\\.",
    "^198\\.51\\.100\\.",
    "^203\\.0\\.113\\.",
    # Allow sanctioned private-repo sync references in workflow text
    "(?i)PAT_SYNC",
    "(?i)PRIVATE_REPO",
    "(?i)x-access-token",
]

commits = [
    # Historical docs-only false positives for foundation-master-key-reference
    "cea299f7b984b983b1f8765fc867af49bb7879b1",
]

# Custom rules for project-specific patterns
[[rules]]
id = "foundation-master-key-reference"
description = "Reference to master.key file path (not the actual key)"
regex = '''(?i)(master\.key|master-key)'''
path = '''(?i)\.md$|readme|docs/'''
[rules.allowlist]
paths = [
    "build/README\\.md",
]
regexes = [
    "keys/master.key is not committed",
    "encrypted with AES-256 using master.key",
    "master.key file is required",
    "is NEVER distributed",
    "key stored in .keys/master.key",
    "is NEVER distribut",
    "key stored in `keys/",
]
