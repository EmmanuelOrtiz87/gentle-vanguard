name: Test Suite

permissions:
  contents: read

concurrency:
  group: test-suite-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Run Test Suite
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TypeScript Type Check (mcp-bridge)
        shell: pwsh
        run: |
          if (Test-Path "adapters/mcp-bridge") {
            Push-Location "adapters/mcp-bridge"
            npm ci --ignore-scripts
            npx tsc --noEmit
            if ($LASTEXITCODE -ne 0) {
              Write-Error "TypeScript type check failed"
              exit 1
            }
            Pop-Location
          } else {
            Write-Warning "mcp-bridge directory not found, skipping TypeScript check"
          }

      - name: Run All Tests
        shell: pwsh
        run: ./scripts/run-tests-simple.ps1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: tests/results/
          retention-days: 14
