# Horizontal Pod Autoscaler for {{project-name}}

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: '{{project-name}}-hpa'
  namespace: '{{namespace}}'
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: '{{project-name}}'
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
