<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Gentle-Vanguard OG Image">
  <defs>
    <linearGradient id="og-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1A2035"/>
    </linearGradient>
    <filter id="og-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="og-circuit" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 20 60 H 50 M 50 60 V 30 H 80 M 80 30 H 110
               M 90 90 H 60 V 75 H 30 M 110 110 V 80 H 90"
            stroke="#1A3050" stroke-width="1" fill="none"/>
      <circle cx="50" cy="60" r="2.5" fill="#1A3050"/>
      <circle cx="80" cy="30" r="2.5" fill="#1A3050"/>
      <circle cx="60" cy="90" r="2.5" fill="#1A3050"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-circuit)" opacity="0.45"/>
  <!-- Left: GV logo large -->
  <g stroke="url(#og-logo-grad)" stroke-width="14" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     filter="url(#og-glow)"
     transform="translate(60, 120) scale(1.3)">
    <path d="M 137.6 146.8 A 63 63 0 1 1 137.6 69.2"/>
    <line x1="88" y1="108" x2="137" y2="108"/>
    <line x1="137" y1="108" x2="113" y2="178"/>
    <line x1="113" y1="178" x2="197" y2="55"/>
    <polyline points="186,51 212,38 206,64"/>
  </g>
  <!-- Right: text content -->
  <text x="500" y="210" fill="#00BFFF"
        font-family="Orbitron, 'Share Tech Mono', monospace"
        font-size="58" font-weight="700" letter-spacing="3">GENTLE-VANGUARD</text>
  <text x="502" y="262" fill="#6B7280"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="20" font-weight="400" letter-spacing="3">ADVANCED TECHNOLOGY SOLUTIONS</text>
  <!-- Divider -->
  <line x1="500" y1="290" x2="1140" y2="290" stroke="#1E3A5F" stroke-width="1"/>
  <!-- Key stats -->
  <text x="502" y="340" fill="#4DCFFF"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="16" font-weight="600" letter-spacing="1">AI-POWERED DEVELOPMENT ORCHESTRATOR</text>
  <!-- Stat pills -->
  <g font-family="'Inter', 'Segoe UI', sans-serif" font-size="15">
    <rect x="500" y="360" width="110" height="34" rx="6" fill="#1A2035"/>
    <text x="555" y="382" fill="#4DCFFF" text-anchor="middle" font-weight="600">17 Agents</text>
    <rect x="625" y="360" width="110" height="34" rx="6" fill="#1A2035"/>
    <text x="680" y="382" fill="#4DCFFF" text-anchor="middle" font-weight="600">134 Skills</text>
    <rect x="750" y="360" width="130" height="34" rx="6" fill="#1A2035"/>
    <text x="815" y="382" fill="#4DCFFF" text-anchor="middle" font-weight="600">10 Tools</text>
    <rect x="895" y="360" width="140" height="34" rx="6" fill="#1A2035"/>
    <text x="965" y="382" fill="#4DCFFF" text-anchor="middle" font-weight="600">AES-256</text>
  </g>
  <!-- Description -->
  <text x="502" y="440" fill="#9CA3AF"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="17" font-weight="400">Persistent memory · Cost-aware routing · SDD lifecycle</text>
  <text x="502" y="468" fill="#9CA3AF"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="17" font-weight="400">Judgment Day review · 16 CI/CD workflows · Cross-platform</text>
  <!-- Bottom tagline -->
  <text x="502" y="560" fill="#4B5563"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="14" letter-spacing="2">NATIVE AI COGNITIVE DEVELOPMENT ECOSYSTEM</text>
</svg>
