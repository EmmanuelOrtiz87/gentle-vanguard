name: Cross-Platform Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC / 23:00 GMT-3 (Argentina timezone)

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    name: Test on ${{ matrix.os }} / PowerShell ${{ matrix.pwsh-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        pwsh-version: ['7.3', '7.4']
        include:
          # Platform-specific configurations
          - os: ubuntu-latest
            pwsh-pre: 'sudo apt-get update && sudo apt-get install -y wget'
          - os: macos-latest
            pwsh-pre: 'brew update'
          - os: windows-latest
            pwsh-pre: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup platform-specific tools (${{ matrix.os }})
        if: matrix.pwsh-pre != ''
        run: ${{ matrix.pwsh-pre }}
        shell: bash

      - name: Verify PowerShell installation
        shell: pwsh
        run: |
          Write-Output "PowerShell Version: $($PSVersionTable.PSVersion)"
          Write-Output "Platform: $([System.Environment]::OSVersion)"
          Write-Output "Home directory: $HOME"

      - name: Setup Node.js (if needed)
        if: hashFiles('package-lock.json') != ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        shell: pwsh
        run: |
          if (Test-Path 'package-lock.json') {
            npm ci --ignore-scripts
          } elseif (Test-Path 'package.json') {
            npm install --ignore-scripts
          }

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester -ErrorAction SilentlyContinue)) {
            Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          }
          Write-Output "Pester version: $((Get-Module -ListAvailable Pester | Select-Object -First 1).Version)"

      - name: Run PowerShell unit tests (Pester)
        shell: pwsh
        continue-on-error: true
        run: |
          if (-not (Test-Path 'tests/unit/')) {
            Write-Output "::warning::No tests/unit/ directory found — skipping Pester tests"
            exit 0
          }
          Write-Output "Running Pester tests..."
          $testResults = Invoke-Pester -Path "tests/unit/" -PassThru
          Write-Output "Pester results: $($testResults.PassedCount) passed, $($testResults.FailedCount) failed, $($testResults.SkippedCount) skipped"
          if ($testResults.FailedCount -gt 0) {
            Write-Output "::warning::$($testResults.FailedCount) Pester test(s) failed — see logs for details"
            exit 0
          }

      - name: Run cross-platform validation tests
        shell: pwsh
        continue-on-error: true
        run: |
          if (-not (Test-Path './scripts/utilities/agent-verify.ps1')) {
            Write-Output "::warning::agent-verify.ps1 not found — skipping cross-platform validation"
            exit 0
          }
          Write-Output "Running cross-platform validation..."
          try {
            & ./scripts/utilities/agent-verify.ps1 -Domain @('tests','structure','hooks') -Verbose
          } catch {
            Write-Output "::warning::agent-verify failed: $_"
          }

      - name: Run integration tests
        shell: pwsh
        run: |
          if (Test-Path 'tests/integration/') {
            Invoke-Pester -Path "tests/integration/" -CI
          } else {
            Write-Output "No integration tests directory found — skipping"
          }

      - name: Verify line endings (LF)
        shell: bash
        run: |
          echo "Checking for CRLF line endings (should have none)..."
          if git grep -l $'\\r$' -- '*.ps1' '*.yml' '*.json' '*.md'; then
            echo "ERROR: Found CRLF line endings. Use LF only."
            exit 1
          fi
          echo "All files use LF line endings"

      - name: Verify cross-platform path handling
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Output "Testing cross-platform path handling..."
          $testPath = Join-Path $HOME "test" "path"
          Write-Output "Home-based path: $testPath"
          $tempPath = [System.IO.Path]::GetTempPath()
          Write-Output "Temp directory: $tempPath"
          if (Test-Path 'scripts/') {
            Get-ChildItem -Path "scripts/" -Filter "*.ps1" -Recurse | ForEach-Object {
              $content = Get-Content $_.FullName -Raw
              if ($content -match 'C:\\|/home/|/Users/') {
                Write-Warning "Found hardcoded path in $($_.Name)"
              }
            }
          }

      - name: Check script portability
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Output "Checking script portability..."
          Write-Output "Portability check completed"

      - name: Run security scan (cross-platform)
        shell: pwsh
        continue-on-error: true
        run: |
          if (Get-Command Invoke-ScriptAnalyzer -ErrorAction SilentlyContinue) {
            Write-Output "Running PSScriptAnalyzer..."
            if (Test-Path 'scripts/') {
              Invoke-ScriptAnalyzer -Path "scripts/" -Recurse -Severity Warning
            } else {
              Write-Output "No scripts/ directory found — skipping PSScriptAnalyzer"
            }
          } else {
            Write-Output "PSScriptAnalyzer not available — skipping"
          }

      - name: Generate test report
        if: always()
        shell: pwsh
        run: |
          $reportPath = "reports/test-results-${{ matrix.os }}-ps${{ matrix.pwsh-version }}.json"
          New-Item -ItemType Directory -Path "reports" -Force | Out-Null
          @{
            os = "${{ matrix.os }}"
            pwsh_version = "${{ matrix.pwsh-version }}"
            timestamp = (Get-Date -AsUTC -Format 'o')
            status = if ($LASTEXITCODE -eq 0) { "PASS" } else { "FAIL" }
          } | ConvertTo-Json | Out-File $reportPath
          Write-Output "Test report saved to $reportPath"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results-${{ matrix.os }}-ps${{ matrix.pwsh-version }}
          path: reports/

  test-summary:
    name: Cross-Platform Test Summary
    runs-on: ubuntu-latest
    needs: test-matrix
    if: always()
    timeout-minutes: 10

    steps:
      - name: Download all test results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: all-results/
        continue-on-error: true

      - name: Summarize results
        run: |
          {
            echo "# Cross-Platform Test Results"
            echo ""
            echo "| OS | PowerShell | Status |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          for result in all-results/*/test-results-*.json; do
            if [ -f "$result" ]; then
              os=$(jq -r '.os' "$result")
              ps_version=$(jq -r '.pwsh_version' "$result")
              status=$(jq -r '.status' "$result")
              echo "| ${os} | ${ps_version} | ${status} |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Check for failures
        run: |
          if [ -d all-results ]; then
            failed=$(find all-results -name "*.json" -exec grep -l '"status": "FAIL"' {} \;)
            if [ -n "$failed" ]; then
              echo "Some tests failed:"
              echo "$failed"
              exit 1
            else
              echo "All cross-platform tests passed!"
            fi
          else
            echo "No test results found — skipping failure check"
          fi

  # Lint and format check (cross-platform)
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run linter
        shell: pwsh
        run: |
          if (Get-Command PSScriptAnalyzer -ErrorAction SilentlyContinue) {
            Invoke-ScriptAnalyzer -Path "scripts/", "config/" -Severity Warning -Recurse
          }

      - name: Check formatting (prettier)
        run: |
          if command -v prettier &> /dev/null; then
            prettier --check "**/*.{json,md,yml}" --ignore-path .prettierignore
          fi
