<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malabis - Tienda de Ropa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo-section">
                <h1 class="logo">MALABIS</h1>
                <p class="tagline">Indumentaria y Accesorios Árabes</p>
            </div>
            <div class="location-info">
                <p>📍 Calle Mendoza entre Calvento y Progreso | Rawson, San Juan</p>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <button class="nav-btn active" data-category="todos">Todos</button>
            <button class="nav-btn" data-category="formal">Formal</button>
            <button class="nav-btn" data-category="informal">Casual</button>
            <button class="nav-btn" data-category="deportiva">Deportiva</button>
            <button class="nav-btn" data-category="fiesta">Fiesta</button>
            <button class="nav-btn" data-category="accesorios">Accesorios</button>
            <button class="nav-btn" data-category="encargo">Encargo</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Products Grid -->
            <section class="products-section">
                <h2 class="section-title">Nuestros Productos</h2>
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here by JavaScript -->
                </div>
            </section>

            <!-- Cart Summary -->
            <section class="cart-summary">
                <div class="cart-card">
                    <h3>Tu Reserva</h3>
                    <div class="cart-items" id="cartItems">
                        <p class="empty-cart">Selecciona productos para comenzar</p>
                    </div>
                    <div class="cart-total">
                        <strong>Total: $<span id="totalPrice">0</span></strong>
                    </div>
                    <div class="cart-actions">
                        <button class="btn btn-secondary" id="clearCartBtn">Limpiar</button>
                        <button class="btn btn-primary" id="submitOrderBtn">Enviar Reserva</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Notification Modal -->
    <div class="modal" id="notificationModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="notification-content" id="notificationContent">
                <!-- Notification will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Malabis - Indumentaria y Accesorios Árabes | Rawson - San Juan</p>
            <p>Contáctanos: WhatsApp | Teléfono | Email</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
