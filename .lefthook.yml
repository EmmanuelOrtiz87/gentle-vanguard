# lefthook.yml v2 — Git hooks for Foundation
# Install: npm install lefthook && npx lefthook install

pre-commit:
  commands:
    opencode-validation:
      run:
        powershell -NoProfile -ExecutionPolicy Bypass -File
        "hooks/pre-commit-opencode-validation.ps1"
    json-lint:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "hooks/json-lint.ps1"
    workflow-lint:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "hooks/workflow-lint.ps1"
    lockfile-lint:
      glob: "package-lock.json"
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/lockfile-lint-pre-commit.ps1"

pre-push:
  commands:
    npm-audit:
      glob: "package.json"
      run:
        pwsh -NoProfile -ExecutionPolicy Bypass -File
        "scripts/hooks/npm-audit-pre-push.ps1" -AuditLevel moderate
    audit-check:
      run:
        powershell -NoProfile -ExecutionPolicy Bypass -Command "
          Write-Host \"[$(Get-Date -Format HH:mm:ss)] audit-check iniciado\" -ForegroundColor Cyan;
          & \"skills/foundation-audit-skill/scripts/audit-sweep.ps1\" -Scope quick;
          Write-Host \"[$(Get-Date -Format HH:mm:ss)] audit-check completado\" -ForegroundColor Cyan"
    orchestrator-auto-fix:
      run:
        powershell -NoProfile -ExecutionPolicy Bypass -Command "
          Write-Host \"[$(Get-Date -Format HH:mm:ss)] orchestrator-auto-fix iniciado\" -ForegroundColor Cyan;
          & \"scripts/hooks/orchestrate-auto-fix.ps1\" -Fix;
          Write-Host \"[$(Get-Date -Format HH:mm:ss)] orchestrator-auto-fix completado\" -ForegroundColor Cyan"
    test-suite:
      run:
        powershell -NoProfile -ExecutionPolicy Bypass -Command "
          Write-Host \"[$(Get-Date -Format HH:mm:ss)] test-suite iniciado (puede tomar ~2-3 min)\" -ForegroundColor Yellow;
          & \"scripts/run-tests-simple.ps1\";
          Write-Host \"[$(Get-Date -Format HH:mm:ss)] test-suite completado\" -ForegroundColor Cyan"

commit-msg:
  commands:
    commitlint:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File "hooks/commitlint.ps1" {1}
