name: Dashboard Auto Refresh

permissions:
  contents: read

concurrency:
  group: dashboard-auto-refresh
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC | 04:00 GMT-3
  push:
    branches:
      - main
    paths:
      - 'scripts/utilities/TELEMETRY-METRICS/generate-dashboard.ps1'
      - 'docs/sessions/metrics/**'
      - 'docs/management/telemetry-master.csv'
      - '.runtime/telemetry/**'
      - '.event-bus/**'

jobs:
  dashboard:
    name: Generate Dashboard Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate dashboard
        shell: pwsh
        run: |
          if (-not (Test-Path './scripts/utilities/TELEMETRY-METRICS/generate-dashboard.ps1')) {
            Write-Output "::warning::generate-dashboard.ps1 not found — skipping dashboard generation"
            New-Item -ItemType Directory -Path "reports" -Force | Out-Null
            "<html><body><p>Dashboard script not available in this environment.</p></body></html>" | Out-File "reports/dashboard.html" -Encoding utf8
            exit 0
          }
          ./scripts/utilities/TELEMETRY-METRICS/generate-dashboard.ps1

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dashboard-${{ github.run_id }}
          path: reports/dashboard.html
          if-no-files-found: error
