# Lefthook configuration for Gentle-Vanguard workspace
# Auto-generated: 2026-05-02

pre-commit:
  commands:
    validate-json:
      glob: "*.json"
      run: powershell -NoProfile -Command "Get-Content '{staged_files}' -Raw | ConvertFrom-Json; if ($?) { Write-Host '[OK] JSON valid' } else { Write-Host '[FAIL] JSON invalid'; exit 1 }"

    check-powershell-syntax:
      glob: "*.ps1"
      exclude: "scripts/utilities/.*"
      run: powershell -NoProfile -Command "& { $ast = [System.Management.Automation.Language.Parser]::ParseFile('{staged_files}', [ref]$null, [ref]$null); if ($ast.EndBlock) { Write-Host '[OK] PowerShell syntax valid' } else { Write-Host '[FAIL] Syntax error'; exit 1 } }"

    check-markdown-accents:
      glob: "*.md"
      run: powershell -NoProfile -Command "& { if (Get-Content '{staged_files}' -Raw | Select-String -Pattern '[áéíóúñ]') { Write-Host '[OK] Spanish accents found' } else { Write-Host '[WARN] No Spanish accents detected' } }"

    check-no-emojis-in-scripts:
      glob: "*.ps1"
      run: powershell -NoProfile -Command "& { if (Get-Content '{staged_files}' -Raw | Select-String -Pattern '[^\x00-\x7F]') { Write-Host '[FAIL] Emojis found in script'; exit 1 } else { Write-Host '[OK] No emojis in script' } }"

commit-msg:
  commands:
    validate-conventional:
      run: powershell -NoProfile -Command "& { $msg = Get-Content '{commit_msg_file}' -Raw; if ($msg -match '^(feat|fix|docs|chore|refactor|test|style|perf|build|ci|revert)(\([a-z]+\))?: .+') { Write-Host '[OK] Conventional commit' } else { Write-Host '[FAIL] Not conventional commit'; exit 1 } }"

post-commit:
  commands:
    update-session:
      run: powershell -NoProfile -Command "& { if (Test-Path scripts/utilities/session-manager.ps1) { .\\tools\\session-manager.ps1 -Action update } }"

post-merge:
  commands:
    sync-deps:
      glob: "package.json"
      run: npm install

    sync-tools:
      run: powershell -NoProfile -Command "& { if (Test-Path 'scripts/utilities/WORKFLOW-ORCHESTRATION/sync-after-merge.ps1') { .\\scripts\\utilities\\WORKFLOW-ORCHESTRATION\\sync-after-merge.ps1 } }"

pre-push:
  commands:
    quick-verify:
      run: powershell -NoProfile -Command "& { if (Test-Path 'scripts/utilities/WORKFLOW-ORCHESTRATION/comprehensive-validation.ps1') { .\\scripts\\utilities\\WORKFLOW-ORCHESTRATION\\comprehensive-validation.ps1 } else { Write-Host '[WARN] Validation script not found' } }"

