model = "gpt-5.5"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
allow_login_shell = false
web_search = "disabled"
project_doc_max_bytes = 16384
file_opener = "vscode"
[sandbox_workspace_write]
network_access = false
[history]
persistence = "save-all"
max_bytes = 2621440
[features]
multi_agent = true
enable_request_compression = true
shell_snapshot = true
[windows]
sandbox = "unelevated"
