# GitLab CI Pipeline
# Add this file as .gitlab-ci.yml in your project root

stages:
  - lint
  - test
  - build
  - security
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

.services:
  - docker:24.0.5-dind

before_script:
  - export LANGUAGE=en_US
  - export LC_ALL=en_US.UTF-8

# ─────────────────────────────────────────────────────────────────────────────
# Lint Stage
# ─────────────────────────────────────────────────────────────────────────────
lint:
  stage: lint
  image: node:20-alpine
  before_script:
    - npm ci
  script:
    - npm run lint
    - npm run typecheck
  allow_failure: false
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

# ─────────────────────────────────────────────────────────────────────────────
# Test Stage
# ─────────────────────────────────────────────────────────────────────────────
test:unit:
  stage: test
  image: node:20-alpine
  before_script:
    - npm ci
  script:
    - npm run test
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

test:e2e:
  stage: test
  image: node:20-alpine
  services:
    - node:20-alpine
  before_script:
    - npm ci
    - npx playwright install --with-deps chromium
  script:
    - npm run test:e2e
  artifacts:
    when: always
    reports:
      junit: playwright-report/junit.xml
    paths:
      - playwright-report/
      - test-results/
  allow_failure: true

# ─────────────────────────────────────────────────────────────────────────────
# Build Stage
# ─────────────────────────────────────────────────────────────────────────────
build:docker:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - develop
    - tags

# ─────────────────────────────────────────────────────────────────────────────
# Security Stage
# ─────────────────────────────────────────────────────────────────────────────
security:deps:
  stage: security
  image: node:20-alpine
  before_script:
    - npm ci
  script:
    - npm audit --audit-level=high
  allow_failure: true

security:sast:
  stage: security
  image: aquasecurity/trivy:latest
  before_script:
    - trivy version
  script:
    - trivy fs --security-checks vuln,config .
  allow_failure: true

# ─────────────────────────────────────────────────────────────────────────────
# Deploy Stage
# ─────────────────────────────────────────────────────────────────────────────
deploy:staging:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl kubectl
  script:
    - kubectl config use-context $K8S_CONTEXT_STAGING
    - kubectl set image deployment/{{project-name}} {{project-name}}=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -n staging
    - kubectl rollout status deployment/{{project-name}} -n staging
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - develop

deploy:production:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl kubectl
  script:
    - kubectl config use-context $K8S_CONTEXT_PROD
    - kubectl set image deployment/{{project-name}} {{project-name}}=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -n production
    - kubectl rollout status deployment/{{project-name}} -n production
  environment:
    name: production
    url: https://example.com
  when: manual
  only:
    - main
    - tags
