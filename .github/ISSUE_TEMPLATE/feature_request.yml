name: Feature Request
description: Suggest an idea for this project
title: "[FEATURE] "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        
        Is your feature request related to a problem? Please describe.
        A clear and concise description of what the problem is.
        
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Describe the feature you'd like to request.
      placeholder: |
        As a [user type], I want [goal] so that [benefit].
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: Describe your proposed solution...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe alternatives you considered.
      placeholder: Any alternative solutions or features you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the feature request?
      placeholder: |
        - Mockups, screenshots
        - References to similar features
        - Priority level (if known)

  - type: dropdown
    id: type
    attributes:
      label: Project Type
      description: Which part of the workspace foundation?
      options:
        - CLI / wf command
        - Templates
        - Skills
        - Documentation
        - Scripts
        - CI/CD
        - Docker / K8s
        - Testing
        - All / General
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This is a new feature/enhancement
          required: true
        - label: I've searched existing issues and PRs
          required: true
        - label: I've considered backward compatibility
          required: true
