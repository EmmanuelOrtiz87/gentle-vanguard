name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  LANGUAGE: en_US
  LC_ALL: en_US.UTF-8

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup runtime
        uses: ./.github/actions/setup

      - name: Run linter
        run: |
          {{lint-command}}
        shell: bash

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup runtime
        uses: ./.github/actions/setup

      - name: Run tests
        run: |
          {{test-command}}
        shell: bash
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Setup runtime
        uses: ./.github/actions/setup

      - name: Build
        run: |
          {{build-command}}
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: |
            {{artifact-paths}}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run security scan
        run: |
          {{security-command}}
        shell: bash

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to staging
        run: |
          {{deploy-staging-command}}
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to production
        run: |
          {{deploy-production-command}}
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.PROD_HOST }}
          DEPLOY_KEY: ${{ secrets.PROD_SSH_KEY }}
