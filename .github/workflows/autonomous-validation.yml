name: Autonomous Validation

permissions:
  contents: read

concurrency:
  group: autonomous-validation-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 10 * * 1'  # Weekly on Monday at 10:00 GMT-3

jobs:
  autonomous-validation:
    name: Autonomous Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure Git
        run: |
          git config --global core.symlinks false
          git config --global core.longpaths true

      - uses: actions/checkout@v4

      - name: Setup PowerShell
        shell: pwsh
        run: |
          Install-Module -Name PowerShellGet -Force -AllowClobber
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser

      - name: Run Comprehensive Validation
        shell: pwsh
        run: |
          ./scripts/utilities/WORKFLOW-ORCHESTRATION/comprehensive-validation.ps1 -Verbose

      - name: Run Cross-Workspace Validation
        shell: pwsh
        run: |
          ./scripts/monitoring/cross-workspace-validator.ps1 -Fix

      - name: Upload Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: .session/reports/
