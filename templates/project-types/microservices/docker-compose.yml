version: '3.9'

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - USERS_URL=http://users:3001
      - ORDERS_URL=http://orders:3002
      - PAYMENTS_URL=http://payments:3003
    depends_on:
      - users
      - orders
      - payments

  users:
    build: ./services/users
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@users-db:5432/users
      - PORT=3001
    depends_on:
      - users-db

  users-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=users
    volumes:
      - users_db_data:/var/lib/postgresql/data

  orders:
    build: ./services/orders
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@orders-db:5432/orders
      - USERS_URL=http://users:3001
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - orders-db
      - users
      - rabbitmq

  orders-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=orders
    volumes:
      - orders_db_data:/var/lib/postgresql/data

  payments:
    build: ./services/payments
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@payments-db:5432/payments
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - payments-db
      - rabbitmq

  payments-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payments
    volumes:
      - payments_db_data:/var/lib/postgresql/data

  notifications:
    build: ./services/notifications
    ports:
      - "3004:3004"
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    depends_on:
      - rabbitmq
      - mailhog

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  users_db_data:
  orders_db_data:
  payments_db_data:
  rabbitmq_data:
