name: Dependency Scan and Backup

permissions:
  contents: read

concurrency:
  group: dependency-backup-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '30 16 * * 0' # Weekly on Sunday at 13:30 GMT-3 (16:30 UTC)

jobs:
  dependency-scan:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.16.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  backup:
    name: Backup Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Archive docs and config
        run: |
          archive_name="backup-$(date +%Y-%m-%d).tar.gz"
          tar -czf "$archive_name" docs/ config/
      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: workspace-backup
          path: backup-*.tar.gz
