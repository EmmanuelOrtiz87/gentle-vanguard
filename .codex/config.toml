# Codex project-scoped configuration (local-first optimized)
# Based on https://developers.openai.com/codex/learn/best-practices

model = "gpt-5.5"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
allow_login_shell = false
web_search = "disabled"
project_doc_max_bytes = 32768
file_opener = "vscode"

# Project docs for context
project_docs = [
  "docs/AGENTS.md",
  ".atl/skill-registry.md",
  "rules/AI-NORMATIVES.md",
  "rules/DEVELOPMENT-STANDARDS.md"
]

# Keep Codex constrained to safe defaults in this repository.
[sandbox_workspace_write]
network_access = false

[history]
persistence = "save-all"
max_bytes = 5242880

[features]
multi_agent = true
enable_request_compression = true
shell_snapshot = true

[profiles]

[profiles.local_first_safe]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"

[profiles.readonly_review]
approval_policy = "never"
sandbox_mode = "read-only"
web_search = "disabled"

[windows]
sandbox = "unelevated"
