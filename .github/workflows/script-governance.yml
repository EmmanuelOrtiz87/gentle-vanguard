name: Script Governance

permissions:
  contents: read

concurrency:
  group: script-governance-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

on:
  push:
    branches: [develop]
    paths:
      - 'scripts/**'
      - 'docs/**'
      - '*.md'
      - 'config/**'
      - '.github/workflows/script-governance.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [develop, main]
    paths:
      - 'scripts/**'
      - 'docs/**'
      - '*.md'
      - 'config/**'
      - '.github/workflows/script-governance.yml'
  workflow_dispatch:

jobs:
  script-governance:
    name: Validate Script Governance and Process Alerts
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Configure Git for Windows
        shell: bash
        run: |
          git config --global core.symlinks false
          git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run script governance checks
        shell: pwsh
        run: |
          # -SkipFallbackTests: skip file-mutation tests (unnecessary in CI — validated locally)
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\diagnostics\validate-script-governance.ps1 -SkipFallbackTests

      - name: Gentle-Vanguard drift check (advisory)
        shell: pwsh
        continue-on-error: true
        run: |
          if (Test-Path '.\scripts\utilities\UTILITIES\gentle-vanguard-sync.ps1') {
            powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\utilities\UTILITIES\gentle-vanguard-sync.ps1 -Mode check
          } else {
            Write-Host '::notice::gentle-vanguard-sync.ps1 not found -- skipping drift check.'
          }

      - name: SDD governance gate (PR)
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          # Mandatory on feature/* and feat/* branches, advisory otherwise.
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\diagnostics\validate-sdd-governance.ps1

      - name: Stack readiness advisory (non-blocking)
        shell: pwsh
        continue-on-error: true
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\utilities\gv.ps1 health

      - name: Agent process compliance alert (non-blocking)
        shell: pwsh
        continue-on-error: true
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\diagnostics\agent-process-alert.ps1 -WindowHours 24 -EmitGitHubAnnotations
