<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-label="Gentle-Vanguard Twitter/X Header">
  <defs>
    <linearGradient id="tw-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="tw-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A2035"/>
    </linearGradient>
    <filter id="tw-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="blur"/>
      <feFlood flood-color="#A855F7" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="tw-circuit" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 15 50 H 40 V 25 H 65 M 65 25 H 90 M 75 75 H 50 V 62 H 25"
            stroke="#1A3050" stroke-width="1" fill="none"/>
      <circle cx="40" cy="50" r="2" fill="#1A3050"/>
      <circle cx="65" cy="25" r="2" fill="#1A3050"/>
      <circle cx="50" cy="75" r="2" fill="#1A3050"/>
    </pattern>
  </defs>
  <rect width="1500" height="500" fill="url(#tw-bg)"/>
  <rect width="1500" height="500" fill="url(#tw-circuit)" opacity="0.4"/>
  <!-- GV logo centered-left -->
  <g stroke="url(#tw-logo-grad)" stroke-width="11" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     filter="url(#tw-glow)"
     transform="translate(180, 80) scale(1.15)">
    <path d="M 137.6 146.8 A 63 63 0 1 1 137.6 69.2"/>
    <line x1="88" y1="108" x2="137" y2="108"/>
    <line x1="137" y1="108" x2="113" y2="178"/>
    <line x1="113" y1="178" x2="197" y2="55"/>
    <polyline points="186,51 212,38 206,64"/>
  </g>
  <!-- Brand name -->
  <text x="600" y="190" fill="#00BFFF"
        font-family="Orbitron, 'Share Tech Mono', monospace"
        font-size="62" font-weight="700" letter-spacing="3" text-anchor="middle">GENTLE-VANGUARD</text>
  <text x="600" y="238" fill="#6B7280"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="19" letter-spacing="4" text-anchor="middle">ADVANCED TECHNOLOGY SOLUTIONS</text>
  <!-- Divider -->
  <line x1="200" y1="265" x2="1000" y2="265" stroke="#1E3A5F" stroke-width="1"/>
  <!-- Tagline -->
  <text x="600" y="315" fill="#9CA3AF"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="18" text-anchor="middle">AI-powered development orchestrator · 17 agents · 134 skills · 10 tools</text>
  <text x="600" y="348" fill="#9CA3AF"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="16" text-anchor="middle">Persistent Memory · Business-Driven Code · Native AI Cognitive Ecosystem</text>
  <!-- Bottom URL -->
  <text x="600" y="430" fill="#374151"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="14" text-anchor="middle" letter-spacing="1">github.com/EmmanuelOrtiz87/gentle-vanguard-public</text>
</svg>
