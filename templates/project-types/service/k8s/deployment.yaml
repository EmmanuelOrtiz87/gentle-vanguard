# Kubernetes manifests for {{project-name}}

apiVersion: v1
kind: Namespace
metadata:
  name: '{{namespace}}'
  labels:
    app.kubernetes.io/name: '{{project-name}}'
    app.kubernetes.io/managed-by: kubectl

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{project-name}}-config'
  namespace: '{{namespace}}'
data:
  NODE_ENV: 'production'
  LOG_LEVEL: 'info'

---
apiVersion: v1
kind: Secret
metadata:
  name: '{{project-name}}-secrets'
  namespace: '{{namespace}}'
type: Opaque
stringData:
  # DATABASE_URL: "postgresql://..."

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{project-name}}'
  namespace: '{{namespace}}'
  labels:
    app.kubernetes.io/name: '{{project-name}}'
    app.kubernetes.io/version: '{{version}}'
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: '{{project-name}}'
  template:
    metadata:
      labels:
        app.kubernetes.io/name: '{{project-name}}'
        app.kubernetes.io/version: '{{version}}'
    spec:
      containers:
        - name: app
          image: '{{image}}'
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: '{{project-name}}-config'
            - secretRef:
                name: '{{project-name}}-secrets'
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: '{{project-name}}-svc'
  namespace: '{{namespace}}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: '{{project-name}}'
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: '{{project-name}}-ing'
  namespace: '{{namespace}}'
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - '{{domain}}'
      secretName: '{{project-name}}-tls'
  rules:
    - host: '{{domain}}'
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: '{{project-name}}-svc'
                port:
                  number: 80
