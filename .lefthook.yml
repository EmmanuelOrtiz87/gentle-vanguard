# lefthook.yml v2 — Git hooks for Foundation
# Install: npm install lefthook && npx lefthook install

pre-commit:
  commands:
    opencode-validation:
      run:
        powershell -NoProfile -ExecutionPolicy Bypass -File
        "hooks/pre-commit-opencode-validation.ps1"
    json-lint:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "hooks/json-lint.ps1"
    workflow-lint:
      run: pwsh -NoProfile -ExecutionPolicy Bypass -File "hooks/workflow-lint.ps1"

pre-push:
  commands:
    orchestrator-auto-fix:
      run:
        powershell -NoProfile -ExecutionPolicy Bypass -File "scripts/hooks/orchestrate-auto-fix.ps1"
        -Fix
    test-suite:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File "scripts/run-tests-simple.ps1"
    audit-check:
      run:
        powershell -NoProfile -ExecutionPolicy Bypass -File
        "skills/foundation-audit-skill/scripts/audit-sweep.ps1" -Scope quick

commit-msg:
  commands:
    commitlint:
      run: powershell -NoProfile -ExecutionPolicy Bypass -File "hooks/commitlint.ps1" {1}
