name: Gentle-Vanguard Quality Gate

permissions:
  contents: read

concurrency:
  group: gentle-vanguard-quality-gate-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [develop]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'config/**'
      - 'rules/**'
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'config/**'
      - 'rules/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  quality-gate:
    name: Gentle-Vanguard Quality Gate
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate config files
        shell: pwsh
        run: |
          if (-not (Test-Path '.\scripts\utilities\validate-configs.ps1')) {
            Write-Output "::warning::validate-configs.ps1 not found — skipping config validation"
            exit 0
          }
          .\scripts\utilities\validate-configs.ps1

      - name: Agent self verification
        shell: pwsh
        run: |
          if (-not (Test-Path '.\scripts\utilities\agent-verify.ps1')) {
            Write-Output "::warning::agent-verify.ps1 not found — skipping agent verification"
            exit 0
          }
          $json = .\scripts\utilities\agent-verify.ps1 -Json
          $result = $json | ConvertFrom-Json
          Write-Host "agent-verify result: $($result.result)"
          Write-Host "Total: $($result.summary.total) | Passed: $($result.summary.passed) | Failed: $($result.summary.failed) | Warnings: $($result.summary.warnings)"
          foreach ($check in $result.checks) {
            $icon = switch ($check.status) { 'PASS' { '[OK]' }; 'FAIL' { '[FAIL]' }; 'WARN' { '[WARN]' }; default { '[?]' } }
            Write-Host "  $icon $($check.check): $($check.message)"
          }
          $blockingFailures = @($result.checks | Where-Object { $_.status -eq 'FAIL' -and $_.check -ne 'uncommitted-changes' })
          if ($blockingFailures.Count -gt 0) {
            Write-Error "agent-verify reported $($blockingFailures.Count) blocking failure(s)"
            exit 1
          }
          if ($result.summary.failed -gt 0) {
            Write-Output "::warning::agent-verify has $($result.summary.failed) failure(s) — check logs for details"
          }
          Write-Host "agent-verify: PASS (warnings: $($result.summary.warnings))"

      - name: SRE Error Budget Check
        shell: pwsh
        continue-on-error: true
        run: |
          if (-not (Test-Path '.\scripts\sre\enforce-error-budget.ps1')) {
            Write-Output "::warning::enforce-error-budget.ps1 not found — skipping SRE check"
            exit 0
          }
          .\scripts\sre\enforce-error-budget.ps1 -Service all
          Write-Host "SRE error budget check completed"

      - name: Validate new config files
        shell: pwsh
        run: |
          $newConfigs = @(
            "config/sre-error-budgets.json",
            "config/PSScriptAnalyzerSettings.psd1"
          )
          $allValid = $true
          foreach ($cfg in $newConfigs) {
            if (Test-Path $cfg) {
              Write-Host "[OK] Config present: $cfg"
            } else {
              Write-Warning "[WARN] Config not found: $cfg"
            }
          }
          if (-not $allValid) { exit 1 }
